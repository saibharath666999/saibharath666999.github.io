<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Detail | SUV Scout India</title>
<link rel="stylesheet" href="styles.css">
<style>
.gallery-main {
  width: 100%;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.car-silhouette {
  width: 70%;
  height: auto;
  transition: filter 0.4s;
}
.view-label {
  position: absolute;
  bottom: 12px;
  left: 12px;
  font-size: 11px;
  color: var(--muted);
  background: rgba(0,0,0,0.5);
  padding: 4px 10px;
  border-radius: 20px;
}
.view-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.view-tab {
  padding: 10px 16px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.color-section { padding: 16px; border-top: 1px solid var(--border); }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.color-dot {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
}
.color-dot.active { border-color: var(--accent); transform: scale(1.15); }
.color-dot-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
}
.view-360-strip {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--info);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}
.view-360-strip:hover { background: var(--bg3); }
.rotation-viewer {
  display: none;
  padding: 20px 16px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.rotation-viewer.open { display: block; }
.rotation-track {
  position: relative;
  height: 160px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  overflow: hidden;
  cursor: grab;
  user-select: none;
}
.rotation-track:active { cursor: grabbing; }
.rotation-angle-label {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 11px;
  color: var(--muted);
}
.rot-car {
  font-size: 72px;
  transition: transform 0.1s;
  pointer-events: none;
}
.rotation-hint { font-size: 11px; color: var(--muted); }
.range-bar-wrap { margin: 6px 0; }
.range-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
.range-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.range-fill { height: 100%; border-radius: 3px; background: var(--ev); }

.full-spec-section { margin-bottom: 40px; }
.full-spec-section h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.variant-selector-row {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.vs-btn {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.vs-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.ev-detail .vs-btn.active { border-color: var(--ev); color: var(--ev); background: var(--ev-dim); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">SUV Scout India<small>2025–2026 · ₹10–20 Lakhs</small></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">All Models</a>
    <a class="nav-link" href="ice.html">ICE / Hybrid</a>
    <a class="nav-link ev" href="ev.html">Electric (EV)</a>
    <a class="nav-compare-btn" href="compare.html">⇌ Compare</a>
  </div>
</nav>

<main class="page-wrap" id="detail-root">
  <!-- Rendered by JS below -->
</main>

<div class="glossary-btn-wrap">
  <button class="glossary-btn" onclick="document.getElementById('gl-modal').classList.add('open')">📖 Glossary</button>
</div>
<div class="glossary-modal" id="gl-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="glossary-inner">
    <h3>Jargon Explained <button class="gl-close" onclick="document.getElementById('gl-modal').classList.remove('open')">✕</button></h3>
    <div id="gl-content"></div>
  </div>
</div>

<footer>
  <p>SUV Scout India · Prices ex-showroom, April 2026.</p>
  <a href="compare.html">Compare vehicles ↗</a>
</footer>

<script src="data.js"></script>
<script>
// Read car ID from URL: vehicle-{id}.html
const pageId = location.pathname.split('/').pop().replace('vehicle-','').replace('.html','');
const allCars = [...ICE_CARS, ...EV_CARS];
const car = allCars.find(c => c.id === pageId);

if (!car) {
  document.getElementById('detail-root').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <p style="font-size:48px;margin-bottom:12px">🚗</p>
      <p>Vehicle not found.</p>
      <a href="index.html" style="color:var(--accent)">← Back to all models</a>
    </div>`;
} else {
  const isEV = car.fuel.includes('electric');
  let curVariant = 0;
  let curColor = 0;
  let curView = 'exterior';
  let rotAngle = 0;

  function priceNum(str) {
    const m = str.match(/[\d.]+/);
    return m ? parseFloat(m[0]) : 0;
  }

  function renderDetail() {
    const v = car.variants[curVariant];
    const col = car.colors[curColor];
    document.title = `${car.brand} ${car.name} ${car.year} | SUV Scout India`;
    if (isEV) document.body.classList.add('ev-detail');

    const backHref = isEV ? 'ev.html' : 'ice.html';
    const backLabel = isEV ? '← Back to EV SUVs' : '← Back to ICE / Hybrid SUVs';

    const specEntries = Object.entries(v.specs);

    // Range bar for EV
    let rangeBar = '';
    if (isEV && v.specs.Range) {
      const km = parseInt(v.specs.Range) || 0;
      const pct = Math.min(100, Math.round(km / 600 * 100));
      rangeBar = `
        <div class="range-bar-wrap">
          <div class="range-label"><span>Certified range</span><span style="color:var(--ev);font-weight:500">${v.specs.Range}</span></div>
          <div class="range-bar"><div class="range-fill" style="width:${pct}%"></div></div>
        </div>`;
    }

    const colorDots = car.colors.map((c,i) =>
      `<span class="color-dot${i===curColor?' active':''}" style="background:${c.hex}" title="${c.name}" onclick="pickColor(${i})"></span>`
    ).join('');

    const variantBtns = car.variants.map((vv,i) =>
      `<button class="vs-btn${i===curVariant?' active':''}" onclick="pickVariant(${i})">${vv.name}<br><small style="font-size:11px;opacity:0.7">${vv.price}</small></button>`
    ).join('');

    // Car emoji for 360 view
    const carEmojis = ['🚗','🚙','🏎️','🚕'];
    const carEmoji = isEV ? '🔋' : '🚙';
    // Use a colored div as stand-in for real image
    const colorStyle = `filter: hue-rotate(${curColor * 60}deg) saturate(${isEV ? 1.4 : 1.2})`;

    document.getElementById('detail-root').innerHTML = `
      <a class="back-link" href="${backHref}">← Back to ${isEV ? 'EV' : 'ICE / Hybrid'} SUVs</a>

      <div class="vehicle-hero">
        <!-- Gallery -->
        <div class="vehicle-gallery">
          <div class="gallery-main" id="gallery-main">
            <div style="text-align:center">
              <div style="font-size:96px;${colorStyle};transition:filter 0.4s" id="car-emoji">🚙</div>
              <div style="font-size:12px;color:var(--muted);margin-top:8px">${col.name}</div>
            </div>
            <div class="view-label" id="view-label">${curView === 'exterior' ? 'Exterior view' : curView === 'interior' ? 'Interior view' : '360° view'}</div>
            ${isEV ? '<div class="view-360-badge" style="color:var(--ev)">⚡ Electric</div>' : '<div class="view-360-badge">360° available</div>'}
          </div>

          <div class="view-tabs">
            <div class="view-tab${curView==='exterior'?' active':''}" onclick="switchView('exterior')">Exterior</div>
            <div class="view-tab${curView==='interior'?' active':''}" onclick="switchView('interior')">Interior</div>
            <div class="view-tab${curView==='360'?' active':''}" onclick="switchView('360')">360° View</div>
          </div>

          <div class="color-section">
            <div class="color-row">${colorDots}</div>
            <div class="color-dot-label" id="color-label">${col.name}</div>
          </div>

          <div class="rotation-viewer${curView==='360'?' open':''}" id="rot-viewer">
            <div class="rotation-track" id="rot-track"
              onmousedown="startDrag(event)" ontouchstart="startDragTouch(event)">
              <div class="rot-car" id="rot-car" style="${colorStyle}">🚙</div>
              <div class="rotation-angle-label" id="rot-angle">0°</div>
            </div>
            <div class="rotation-hint">← Drag left/right to rotate →</div>
          </div>

          <div class="view-360-strip" onclick="switchView('360')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#5b9cf6" stroke-width="1.5"/><path d="M5 8c0-1.7 1.3-3 3-3s3 1.3 3 3-1.3 3-3 3" stroke="#5b9cf6" stroke-width="1.5" stroke-linecap="round"/><path d="M5 8l-1.5-1.5M5 8l-1.5 1.5" stroke="#5b9cf6" stroke-width="1.5" stroke-linecap="round"/></svg>
            Launch 360° interactive view
          </div>
        </div>

        <!-- Info panel -->
        <div class="vehicle-info-panel">
          <div class="veh-badge-row">
            <span class="veh-badge year">${car.year}</span>
            ${isEV ? '<span class="veh-badge ev">Electric</span>' : ''}
            ${car.fuel.map(f => `<span class="veh-badge fuel">${f.charAt(0).toUpperCase()+f.slice(1)}</span>`).join('')}
          </div>
          <div class="veh-title">${car.name}</div>
          <div class="veh-brand">${car.brand} · ${car.meta.join(' · ')}</div>

          <div class="price-card">
            <div class="range-lbl">Starting price</div>
            <div class="range-val${isEV?' ev':''}">${car.priceRange}</div>
            <div class="note">Ex-showroom. On-road typically 10–18% higher.</div>
            ${rangeBar}
          </div>

          <div class="quick-specs">
            ${specEntries.slice(0,6).map(([k,val])=>`<div class="qs-item"><div class="qs-k">${k}</div><div class="qs-v">${val}</div></div>`).join('')}
          </div>

          <button onclick="_selected.add('${car.id}');_updateCompareBar();alert('Added to comparison! Go to compare.html to view.')" style="width:100%;padding:11px;background:var(--${isEV?'ev':'accent'});color:#0e0f11;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px">
            Add to comparison ↗
          </button>
          <a href="${isEV?'ev.html':'ice.html'}" style="display:block;text-align:center;font-size:12px;color:var(--muted);text-decoration:none;padding:6px">← Back to all ${isEV?'EV':'ICE / Hybrid'} SUVs</a>
        </div>
      </div>

      <!-- Variant selector -->
      <div class="full-spec-section">
        <h3>Select variant</h3>
        <div class="variant-selector-row">${variantBtns}</div>
      </div>

      <!-- Full specs by section -->
      ${renderFullSpecs(v, isEV)}
    `;

    setupDrag();
  }

  function renderFullSpecs(v, isEV) {
    const sections = [
      { title: '📋 Specifications', key: 'specs', type: 'grid' },
      { title: '🛋️ Interior', key: 'interior', type: 'tags' },
      { title: '🚘 Exterior', key: 'exterior', type: 'tags' },
      { title: '⚡ Performance', key: 'performance', type: 'tags' },
      { title: '🛡️ Safety', key: 'safety', type: 'tags' },
    ];
    return sections.map(s => {
      let content = '';
      if (s.type === 'grid') {
        content = `<div class="price-line"><span class="pl">Ex-showroom price</span><span class="pv${isEV?' ev':''}">${v.price}</span></div>
          <div class="spec-grid">${Object.entries(v.specs).map(([k,val])=>`<div class="spec-item"><div class="spec-k">${k}</div><div class="spec-v">${highlightJargon(String(val),isEV)}</div></div>`).join('')}</div>`;
      } else {
        const items = v[s.key] || [];
        content = `<div class="feature-list">${items.map(f=>`<span class="f-tag">${highlightJargon(f,isEV)}</span>`).join('')}</div>`;
      }
      return `<div class="full-spec-section"><h3>${s.title}</h3>${content}</div>`;
    }).join('');
  }

  function pickColor(idx) {
    curColor = idx;
    const col = car.colors[idx];
    document.querySelectorAll('.color-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
    document.getElementById('color-label').textContent = col.name;
    const f = `filter: hue-rotate(${idx*60}deg) saturate(1.3)`;
    ['car-emoji','rot-car'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.filter = `hue-rotate(${idx*60}deg) saturate(1.3)`;
    });
  }

  function pickVariant(idx) {
    curVariant = idx;
    renderDetail();
  }

  function switchView(view) {
    curView = view;
    const tabs = document.querySelectorAll('.view-tab');
    tabs.forEach((t,i) => t.classList.toggle('active', ['exterior','interior','360'][i] === view));
    const rv = document.getElementById('rot-viewer');
    if (rv) rv.classList.toggle('open', view === '360');
    const lbl = document.getElementById('view-label');
    if (lbl) lbl.textContent = view === 'exterior' ? 'Exterior view' : view === 'interior' ? 'Interior view' : '360° interactive';
  }

  // 360 drag
  let isDragging = false, dragStartX = 0, startAngle = 0;
  function setupDrag() {
    const track = document.getElementById('rot-track');
    if (!track) return;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('touchmove', onDragTouch, { passive: false });
    document.addEventListener('touchend', () => isDragging = false);
  }
  window.startDrag = function(e) { isDragging = true; dragStartX = e.clientX; startAngle = rotAngle; };
  window.startDragTouch = function(e) { isDragging = true; dragStartX = e.touches[0].clientX; startAngle = rotAngle; };
  function onDrag(e) {
    if (!isDragging) return;
    const delta = e.clientX - dragStartX;
    rotAngle = (startAngle + Math.round(delta / 3)) % 360;
    if (rotAngle < 0) rotAngle += 360;
    updateRotation();
  }
  function onDragTouch(e) {
    if (!isDragging) return;
    e.preventDefault();
    const delta = e.touches[0].clientX - dragStartX;
    rotAngle = (startAngle + Math.round(delta / 3)) % 360;
    if (rotAngle < 0) rotAngle += 360;
    updateRotation();
  }
  function updateRotation() {
    const el = document.getElementById('rot-car');
    const lbl = document.getElementById('rot-angle');
    if (el) el.style.transform = `rotateY(${rotAngle}deg) scaleX(${rotAngle > 90 && rotAngle < 270 ? -1 : 1})`;
    if (lbl) lbl.textContent = rotAngle + '°';
  }

  window.pickColor = pickColor;
  window.pickVariant = pickVariant;
  window.switchView = switchView;

  renderDetail();
}

document.getElementById('gl-content').innerHTML = renderGlossary();
</script>
</body>
</html>
